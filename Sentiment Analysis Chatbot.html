<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Smart Assistant Pro</title>

<style>

body{
margin:0;
font-family:Segoe UI;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
}

.chat-app{
width:420px;
height:650px;
background:rgba(255,255,255,0.9);
backdrop-filter:blur(10px);
border-radius:20px;
box-shadow:0 20px 50px rgba(0,0,0,.4);
display:flex;
flex-direction:column;
overflow:hidden;
}

.header{
background:linear-gradient(90deg,#6366f1,#4f46e5);
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.header h3{
margin:0;
font-size:16px;
}

.header button{
background:none;
border:none;
color:white;
font-size:16px;
cursor:pointer;
}

.chat-box{
flex:1;
padding:15px;
overflow-y:auto;
background:#f1f5f9;
}

.message{
max-width:75%;
padding:12px 14px;
border-radius:14px;
margin:10px 0;
font-size:14px;
line-height:1.4;
animation:fade .3s ease;
}

@keyframes fade{
from{opacity:0;transform:translateY(10px)}
to{opacity:1}
}

.user{
background:#4f46e5;
color:white;
margin-left:auto;
}

.bot{
background:#e5e7eb;
}

.typing{
font-size:12px;
color:#777;
margin:5px 0;
}

.input-area{
display:flex;
border-top:1px solid #ddd;
}

input{
flex:1;
padding:14px;
border:none;
outline:none;
font-size:14px;
}

button.send{
background:#4f46e5;
border:none;
color:white;
padding:0 18px;
cursor:pointer;
}

button.send:hover{
background:#4338ca;
}

.suggestions{
display:flex;
flex-wrap:wrap;
gap:6px;
padding:10px;
background:#fafafa;
border-top:1px solid #eee;
}

.suggestions span{
background:#e0e7ff;
padding:6px 10px;
border-radius:12px;
font-size:12px;
cursor:pointer;
transition:.2s;
}

.suggestions span:hover{
background:#c7d2fe;
}

.dark{
background:#111827;
color:white;
}

.dark .chat-box{
background:#1f2937;
}

.dark .bot{
background:#374151;
color:white;
}

.controls{
display:flex;
gap:8px;
}

.clear{
font-size:12px;
background:#ef4444;
border:none;
color:white;
padding:5px 10px;
border-radius:6px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="chat-app">

<div class="header">
<h3>AI Smart Assistant</h3>

<div class="controls">
<button onclick="toggleTheme()">🌙</button>
<button class="clear" onclick="clearChat()">Clear</button>
</div>

</div>

<div id="chatBox" class="chat-box"></div>

<div class="suggestions">
<span onclick="quickMsg(this)">Hello</span>
<span onclick="quickMsg(this)">Pricing</span>
<span onclick="quickMsg(this)">Support</span>
<span onclick="quickMsg(this)">Services</span>
<span onclick="quickMsg(this)">Contact</span>
</div>

<div class="input-area">
<input id="input" placeholder="Ask anything...">
<button class="send" onclick="send()">Send</button>
</div>

</div>

<script>

let positiveWords=["good","great","awesome","love","excellent","happy"]
let negativeWords=["bad","sad","angry","terrible","problem","issue"]

let intents={

hello:"👋 Hello! How can I assist you today?",

pricing:"💰 Our pricing plans start from $9/month.",

support:"🛠 Our support team is available 24/7.",

services:"🚀 We provide AI, Web Development, and Automation services.",

contact:"📧 Contact us at support@example.com"

}

let sentimentReplies={

positive:[
"😊 That's wonderful!",
"Glad to hear that!",
"Awesome! Let me know if you need more help."
],

negative:[
"😔 Sorry to hear that.",
"I'll try my best to fix that issue.",
"Let me help solve your problem."
],

neutral:[
"How can I assist you?",
"Tell me more.",
"I'm here to help."
]

}

function detectSentiment(text){

text=text.toLowerCase()

for(let w of positiveWords)
if(text.includes(w)) return "positive"

for(let w of negativeWords)
if(text.includes(w)) return "negative"

return "neutral"

}

function detectIntent(text){

text=text.toLowerCase()

for(let key in intents)
if(text.includes(key))
return intents[key]

return null

}

function random(arr){
return arr[Math.floor(Math.random()*arr.length)]
}

function addMessage(text,type){

let msg=document.createElement("div")
msg.className="message "+type
msg.innerText=text

chatBox.appendChild(msg)

chatBox.scrollTop=chatBox.scrollHeight

saveChat()

}

function botTyping(){

let typing=document.createElement("div")
typing.className="typing"
typing.id="typing"
typing.innerText="AI is typing..."

chatBox.appendChild(typing)

}

function removeTyping(){
let t=document.getElementById("typing")
if(t) t.remove()
}

function send(){

let input=document.getElementById("input")
let text=input.value.trim()

if(text==="") return

addMessage(text,"user")

input.value=""

botTyping()

setTimeout(()=>{

removeTyping()

let intent=detectIntent(text)

let reply

if(intent){
reply=intent
}else{
let sentiment=detectSentiment(text)
reply=random(sentimentReplies[sentiment])
}

addMessage(reply,"bot")

},800)

}

document.getElementById("input")
.addEventListener("keypress",e=>{
if(e.key==="Enter") send()
})

function quickMsg(el){
document.getElementById("input").value=el.innerText
send()
}

function toggleTheme(){
document.body.classList.toggle("dark")
}

function saveChat(){
localStorage.setItem("chatHistory",chatBox.innerHTML)
}

function clearChat(){
chatBox.innerHTML=""
localStorage.removeItem("chatHistory")
}

window.onload=()=>{
let history=localStorage.getItem("chatHistory")
if(history){
chatBox.innerHTML=history
}
}

</script>

</body>
</html>
