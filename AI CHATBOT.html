<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>World Class AI Chatbot</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI;
}

body{

background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
height:100vh;
display:flex;
justify-content:center;
align-items:center;

}

/* CHAT APP */

.chat-app{

width:95%;
max-width:450px;
height:92vh;
background:white;
border-radius:16px;
display:flex;
flex-direction:column;
box-shadow:0 20px 50px rgba(0,0,0,0.5);
overflow:hidden;

}

/* HEADER */

.header{

background:#0f2027;
color:white;
padding:18px;
text-align:center;
font-size:20px;
font-weight:bold;

}

/* CHAT BOX */

.chat-box{

flex:1;
padding:15px;
overflow-y:auto;
background:#f4f6f9;

}

/* MESSAGE */

.message{

padding:12px 14px;
border-radius:14px;
margin:8px 0;
max-width:75%;
animation:fade .3s ease;

}

@keyframes fade{
from{opacity:0;transform:translateY(5px)}
to{opacity:1}
}

.user{

background:#4facfe;
color:white;
margin-left:auto;

}

.bot{

background:white;
border:1px solid #eee;

}

/* INPUT */

.input-area{

display:flex;
border-top:1px solid #ddd;

}

input{

flex:1;
padding:14px;
border:none;
outline:none;
font-size:15px;

}

button{

background:#4facfe;
border:none;
color:white;
padding:14px 18px;
cursor:pointer;
font-weight:bold;

}

/* MOBILE */

@media(max-width:600px){

.chat-app{
height:100vh;
border-radius:0;
}

}

</style>
</head>


<body>

<div class="chat-app">

<div class="header">
AI Knowledge Chatbot
</div>

<div class="chat-box" id="chatBox"></div>

<div class="input-area">

<input id="input" placeholder="Ask anything...">

<button onclick="send()">Send</button>

</div>

</div>


<script>

/* =============================
VECTOR DATABASE
=============================*/

let vectorDB=JSON.parse(localStorage.getItem("vectorDB"))||[

{
q:"what is ai",
a:"Artificial Intelligence enables machines to simulate human intelligence."
},

{
q:"what is machine learning",
a:"Machine Learning allows systems to learn patterns from data automatically."
},

{
q:"what is cloud computing",
a:"Cloud computing delivers computing services through the internet."
}

];


/* =============================
VECTOR EMBEDDING
=============================*/

function embed(text){

let v=new Array(20).fill(0)

for(let i=0;i<text.length;i++){

v[i%20]+=text.charCodeAt(i)

}

return v

}


/* =============================
COSINE SIMILARITY
=============================*/

function similarity(a,b){

let dot=0
let magA=0
let magB=0

for(let i=0;i<a.length;i++){

dot+=a[i]*b[i]
magA+=a[i]*a[i]
magB+=b[i]*b[i]

}

return dot/(Math.sqrt(magA)*Math.sqrt(magB))

}


/* =============================
SEMANTIC SEARCH
=============================*/

function search(query){

let qv=embed(query)

let bestScore=0
let bestAnswer="I am learning new knowledge..."

vectorDB.forEach(item=>{

let score=similarity(qv,embed(item.q))

if(score>bestScore){

bestScore=score
bestAnswer=item.a

}

})

return bestAnswer

}


/* =============================
CHAT UI
=============================*/

function add(text,type){

let m=document.createElement("div")

m.className="message "+type

m.innerText=text

document.getElementById("chatBox").appendChild(m)

document.getElementById("chatBox").scrollTop=99999

}


/* =============================
SEND MESSAGE
=============================*/

function send(){

let input=document.getElementById("input")

let text=input.value.trim()

if(!text)return

add(text,"user")

input.value=""

typing()

setTimeout(()=>{

let response=search(text)

removeTyping()

add(response,"bot")

},700)

}


/* =============================
TYPING EFFECT
=============================*/

function typing(){

let t=document.createElement("div")

t.id="typing"

t.className="message bot"

t.innerText="AI is typing..."

document.getElementById("chatBox").appendChild(t)

}

function removeTyping(){

let t=document.getElementById("typing")

if(t)t.remove()

}


/* =============================
AUTO LEARNING SYSTEM
=============================*/

function learn(question,answer){

vectorDB.push({

q:question,
a:answer

})

localStorage.setItem("vectorDB",JSON.stringify(vectorDB))

}


/* =============================
AUTO KNOWLEDGE UPDATE
=============================*/

async function autoUpdate(){

try{

let newKnowledge=[

{
q:"what is blockchain",
a:"Blockchain is a decentralized distributed ledger technology."
},

{
q:"what is cybersecurity",
a:"Cybersecurity protects systems networks and data from digital attacks."
}

]

newKnowledge.forEach(item=>vectorDB.push(item))

localStorage.setItem("vectorDB",JSON.stringify(vectorDB))

console.log("Knowledge Updated")

}catch(e){

console.log("Update Failed")

}

}


/* =============================
PERIODIC UPDATE
=============================*/

setInterval(autoUpdate,60000)


/* =============================
ENTER KEY
=============================*/

document.getElementById("input")

.addEventListener("keypress",function(e){

if(e.key==="Enter")send()

})


/* =============================
GREETING
=============================*/

window.onload=()=>{

add("Hello 👋 I am an AI chatbot that continuously expands its knowledge.","bot")

}

</script>

</body>
</html>
