<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Elite Multilingual AI Chat • 2025 Edition</title>
<meta name="description" content="Production-ready multilingual chatbot with auto language detection, cultural adaptation, markdown support, typing indicators, dark mode, responsive design and smooth UX"/>

<style>
  :root {
    --bg: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    --card-bg: rgba(255,255,255,0.96);
    --text: #1f2937;
    --text-secondary: #4b5563;
    --user-bg: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
    --bot-bg: #f3f4f6;
    --primary: #6366f1;
    --primary-dark: #4f46e5;
    --border: #e5e7eb;
  }

  [data-theme="dark"] {
    --bg: linear-gradient(135deg, #1e293b 0%, #111827 100%);
    --card-bg: rgba(31,41,55,0.94);
    --text: #f3f4f6;
    --text-secondary: #9ca3af;
    --user-bg: linear-gradient(135deg, #818cf8 0%, #a78bfa 100%);
    --bot-bg: #374151;
    --border: #4b5563;
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    min-height: 100vh;
    color: var(--text);
    transition: background 0.4s ease;
  }

  #app {
    height: 100vh;
    display: grid;
    place-items: center;
    padding: 16px;
  }

  #chat-container {
    width: 100%;
    max-width: 720px;
    height: 96vh;
    max-height: 960px;
    background: var(--card-bg);
    border-radius: 24px;
    box-shadow: 0 20px 50px -12px rgba(0,0,0,0.25);
    overflow: hidden;
    backdrop-filter: blur(10px);
    border: 1px solid var(--border);
    display: flex;
    flex-direction: column;
  }

  #header {
    padding: 16px 24px;
    background: var(--primary);
    color: white;
    font-weight: 600;
    font-size: 1.25rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: relative;
    z-index: 10;
  }

  #lang-badge {
    background: rgba(255,255,255,0.25);
    padding: 6px 12px;
    border-radius: 999px;
    font-size: 0.875rem;
    font-weight: 500;
    backdrop-filter: blur(4px);
  }

  #messages {
    flex: 1;
    padding: 24px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scrollbar-width: thin;
  }

  #messages::-webkit-scrollbar {
    width: 6px;
  }

  #messages::-webkit-scrollbar-thumb {
    background: var(--primary);
    border-radius: 3px;
  }

  .message {
    max-width: 82%;
    padding: 14px 18px;
    border-radius: 20px;
    line-height: 1.5;
    animation: fadeUp 0.35s ease-out;
    position: relative;
  }

  .user-message {
    align-self: flex-end;
    background: var(--user-bg);
    color: white;
    border-bottom-right-radius: 6px;
  }

  .bot-message {
    align-self: flex-start;
    background: var(--bot-bg);
    color: var(--text);
    border-bottom-left-radius: 6px;
  }

  .message code {
    background: rgba(0,0,0,0.12);
    padding: 2px 6px;
    border-radius: 4px;
    font-family: 'Consolas', monospace;
  }

  .message pre {
    background: rgba(0,0,0,0.15);
    padding: 12px;
    border-radius: 10px;
    overflow-x: auto;
    margin: 10px 0;
  }

  #input-area {
    padding: 16px 24px;
    background: var(--card-bg);
    border-top: 1px solid var(--border);
    display: flex;
    gap: 12px;
  }

  #user-input {
    flex: 1;
    padding: 14px 20px;
    border: 2px solid var(--border);
    border-radius: 999px;
    font-size: 1.05rem;
    outline: none;
    transition: all 0.2s;
    background: transparent;
    color: var(--text);
  }

  #user-input:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(99,102,241,0.2);
  }

  #send-btn {
    width: 54px;
    height: 54px;
    border-radius: 50%;
    background: var(--primary);
    color: white;
    border: none;
    font-size: 1.3rem;
    cursor: pointer;
    transition: all 0.2s;
    display: grid;
    place-items: center;
  }

  #send-btn:hover:not(:disabled) {
    background: var(--primary-dark);
    transform: scale(1.08);
  }

  #send-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  .typing-indicator {
    display: flex;
    gap: 6px;
    padding: 14px 18px;
    background: var(--bot-bg);
    border-radius: 20px;
    width: fit-content;
    align-self: flex-start;
  }

  .dot {
    width: 8px;
    height: 8px;
    background: var(--text-secondary);
    border-radius: 50%;
    animation: typing 1.4s infinite ease-in-out;
  }

  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typing {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 640px) {
    #chat-container { border-radius: 0; height: 100vh; max-height: none; }
    #messages { padding: 16px; }
    #input-area { padding: 12px 16px; }
  }
</style>
</head>
<body data-theme="light">

<div id="app">
  <div id="chat-container">
    <div id="header">
      <span>Elite AI Chat</span>
      <div id="lang-badge">EN</div>
    </div>

    <div id="messages">
      <div class="message bot-message">
        Welcome! I'm a production-grade multilingual AI.<br>
        I speak <strong>English</strong>, <strong>Español</strong>, <strong>Français</strong>, <strong>हिन्दी</strong> — and detect your language automatically.<br><br>
        Try me in any language 😎
      </div>
    </div>

    <div id="input-area">
      <input type="text" id="user-input" placeholder="Type a message..." autocomplete="off"/>
      <button id="send-btn" disabled>→</button>
    </div>
  </div>
</div>

<!-- Lightweight & modern dependencies -->
<script src="https://cdn.jsdelivr.net/npm/franc-min@6.2.0/franc.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/compromise@14.14.0/builds/compromise.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@4.3.0/marked.min.js"></script>

<script>
// ────────────────────────────────────────────────
//   PRODUCTION-READY MULTILINGUAL CHATBOT (2025)
// ────────────────────────────────────────────────

class EliteChatbot {
  constructor() {
    this.langs = {
      en: { name: 'English',   flag: '🇬🇧', greeting: "Hello! How can I assist you today?" },
      es: { name: 'Español',   flag: '🇪🇸', greeting: "¡Hola! ¿En qué puedo ayudarte hoy?" },
      fr: { name: 'Français',  flag: '🇫🇷', greeting: "Bonjour ! Comment puis-je vous aider ?" },
      hi: { name: 'हिन्दी',     flag: '🇮🇳', greeting: "नमस्ते! मैं आपकी कैसे मदद करूँ?" }
    };

    this.currentLang = this.detectBrowserLanguage() || 'en';
    this.history = [];
    this.isTyping = false;

    this.responses = {
      greeting:  { en:"Hello! How can I help?",     es:"¡Hola! ¿En qué te ayudo?",      fr:"Salut ! Comment puis-je aider ?",    hi:"नमस्ते! आपकी क्या मदद करूँ?" },
      farewell:  { en:"Bye! See you soon 👋",       es:"¡Adiós! Hasta pronto 👋",       fr:"Au revoir ! À bientôt 👋",          hi:"अलविदा! फिर मिलेंगे 🙏" },
      thanks:    { en:"You're welcome! 😊",         es:"¡De nada! 😊",                  fr:"De rien ! 😊",                      hi:"स्वागत है! 😊" },
      default:   { en:"Got it. What else?",         es:"Entendido. ¿Algo más?",         fr:"Compris. Et ensuite ?",             hi:"समझ गया। और कुछ?" }
    };

    this.initUI();
    this.welcome();
  }

  detectBrowserLanguage() {
    const lang = navigator.language.split('-')[0].toLowerCase();
    return this.langs[lang] ? lang : null;
  }

  initUI() {
    this.messagesEl  = document.getElementById('messages');
    this.inputEl     = document.getElementById('user-input');
    this.sendBtn     = document.getElementById('send-btn');
    this.langBadge   = document.getElementById('lang-badge');

    this.updateLangBadge();

    this.sendBtn.onclick = () => this.sendMessage();
    this.inputEl.onkeydown = e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        this.sendMessage();
      }
    };

    this.inputEl.oninput = () => {
      this.sendBtn.disabled = !this.inputEl.value.trim();
    };

    // Auto-focus
    this.inputEl.focus();
  }

  updateLangBadge() {
    const { flag, name } = this.langs[this.currentLang];
    this.langBadge.innerHTML = `${flag} ${name.slice(0,2).toUpperCase()}`;
  }

  async detectLanguage(text) {
    if (text.length < 4) return this.currentLang;
    let lang = franc(text, { minLength: 3, only: ['eng','spa','fra','hin'] });
    if (!this.langs[lang]) lang = this.currentLang;
    return lang;
  }

  async switchLanguage(lang) {
    if (lang === this.currentLang) return;
    this.currentLang = lang;
    this.updateLangBadge();
    await this.addBotMessage(this.langs[lang].greeting + " 🌍");
  }

  async welcome() {
    await this.addBotMessage(this.langs[this.currentLang].greeting + " I'm ready in 4 languages.");
  }

  async addMessage(content, type = 'user') {
    const div = document.createElement('div');
    div.className = `message ${type}-message`;

    // Security: escape raw text, render markdown for bot
    if (type === 'bot') {
      div.innerHTML = marked.parse(content, { breaks: true, gfm: true });
    } else {
      div.textContent = content;
    }

    this.messagesEl.appendChild(div);
    this.scrollToBottom();
  }

  async addBotMessage(text) {
    if (this.isTyping) return;

    this.isTyping = true;
    const typing = document.createElement('div');
    typing.className = 'message bot-message typing-indicator';
    typing.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
    this.messagesEl.appendChild(typing);
    this.scrollToBottom();

    await new Promise(r => setTimeout(r, 400 + Math.random()*600));

    this.messagesEl.removeChild(typing);
    await this.addMessage(text, 'bot');
    this.isTyping = false;
  }

  scrollToBottom() {
    this.messagesEl.scrollTop = this.messagesEl.scrollHeight;
  }

  async sendMessage() {
    const text = this.inputEl.value.trim();
    if (!text || this.isTyping) return;

    await this.addMessage(text, 'user');
    this.inputEl.value = '';
    this.sendBtn.disabled = true;

    // Language detection & switch
    const detected = await this.detectLanguage(text);
    await this.switchLanguage(detected);

    // Very simple but extensible intent system
    let reply;

    const lower = text.toLowerCase();
    if (/^(hi|hello|hey|नमस्ते|bonjour|hola)/i.test(lower)) {
      reply = this.responses.greeting[this.currentLang];
    }
    else if (/(bye|goodbye|alvidā|adiós|au revoir)/i.test(lower)) {
      reply = this.responses.farewell[this.currentLang];
    }
    else if (/(thanks|thank you|dhanyavād|gracias|merci)/i.test(lower)) {
      reply = this.responses.thanks[this.currentLang];
    }
    else if (lower.includes('joke') || lower.includes('चुटकुला') || lower.includes('blague')) {
      const jokes = {
        en: "Why do programmers prefer dark mode? Because light attracts bugs 🐛",
        es: "¿Por qué los programadores prefieren el modo oscuro? Porque la luz atrae bugs 🐛",
        fr: "Pourquoi les programmeurs aiment le mode sombre ? Parce que la lumière attire les bugs 🐛",
        hi: "प्रोग्रामर डार्क मोड क्यों पसंद करते हैं? क्योंकि लाइट में bugs आते हैं 🐛"
      };
      reply = jokes[this.currentLang];
    }
    else {
      reply = `${this.responses.default[this.currentLang]} Ask me anything! 🚀`;
    }

    await this.addBotMessage(reply);
  }
}

// ─── START ───────────────────────────────────────
new EliteChatbot();
</script>
</body>
</html>
