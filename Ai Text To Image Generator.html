<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ultra AI Multimodal Chatbot</title>

<style>

body{
margin:0;
font-family:Segoe UI;
background:#0f172a;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.app{
width:430px;
height:720px;
background:#020617;
border-radius:20px;
display:flex;
flex-direction:column;
overflow:hidden;
color:white;
box-shadow:0 0 40px rgba(0,0,0,0.6);
}

header{
padding:15px;
text-align:center;
background:#111827;
font-weight:bold;
}

.chat{
flex:1;
overflow-y:auto;
padding:15px;
}

.message{
margin-bottom:15px;
padding:12px;
border-radius:10px;
max-width:80%;
}

.user{
background:#2563eb;
margin-left:auto;
}

.bot{
background:#1e293b;
}

.controls{
display:flex;
padding:10px;
gap:5px;
background:#111827;
}

input{
flex:1;
padding:10px;
border:none;
border-radius:8px;
}

button{
padding:10px;
border:none;
background:#3b82f6;
color:white;
border-radius:8px;
cursor:pointer;
}

img{
max-width:100%;
border-radius:10px;
margin-top:10px;
}

.typing{
opacity:0.6;
font-style:italic;
}

</style>

</head>

<body>

<div class="app">

<header>Ultra Multimodal AI</header>

<div id="chat" class="chat"></div>

<div class="controls">

<input id="prompt" placeholder="Ask anything...">

<input type="file" id="imageInput">

<button onclick="send()">Send</button>

</div>

</div>

<script>

const API_KEY="YOUR_GEMINI_API_KEY"

const chat=document.getElementById("chat")

let history=[]

function addMessage(text,type,img=null){

let div=document.createElement("div")
div.className="message "+type

div.innerHTML=text

if(img){
let image=document.createElement("img")
image.src=img
div.appendChild(image)
}

chat.appendChild(div)
chat.scrollTop=chat.scrollHeight

}

function typing(){

let div=document.createElement("div")
div.className="message bot typing"
div.id="typing"
div.innerHTML="AI is thinking..."

chat.appendChild(div)

}

function stopTyping(){

let t=document.getElementById("typing")

if(t) t.remove()

}

async function send(){

let prompt=document.getElementById("prompt").value

if(!prompt) return

addMessage(prompt,"user")

history.push({role:"user",parts:[{text:prompt}]})

typing()

let file=document.getElementById("imageInput").files[0]

let parts=[{text:prompt}]

if(file){

let reader=new FileReader()

reader.onload=async function(){

let base64=reader.result.split(",")[1]

parts.push({

inlineData:{
mimeType:"image/png",
data:base64
}

})

await askGemini(parts)

}

reader.readAsDataURL(file)

}else{

await askGemini(parts)

}

}

async function askGemini(parts){

let response=await fetch(

"https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key="+API_KEY,

{
method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

contents:[
...history,
{role:"user",parts:parts}
]

})

}

)

let data=await response.json()

stopTyping()

let text=data.candidates[0].content.parts[0].text

addMessage(text,"bot")

history.push({role:"model",parts:[{text:text}]})

}

</script>

</body>
</html>
